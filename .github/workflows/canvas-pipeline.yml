name: CANVAS Tweet Pipeline

on:
  schedule:
    # Runs daily at 6:00 AM Las Vegas time (Pacific, UTC-7 / UTC-8 in winter)
    - cron: '0 13 * * *'
  workflow_dispatch: # Allow manual runs from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system dependencies (canvas)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential \
            libcairo2-dev \
            libpango1.0-dev \
            libjpeg-dev \
            libgif-dev \
            librsvg2-dev

      - name: Install dependencies
        run: npm ci

      - name: Write service-account.json from secret
        run: echo '${{ secrets.SERVICE_ACCOUNT_JSON }}' > service-account.json

      - name: Write .env.local from secrets
        run: |
          {
            echo "APIFY_API_KEY=${{ secrets.APIFY_API_KEY }}"
            echo "GOOGLE_DRIVE_FOLDER_ID=${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}"
            echo "GOOGLE_SERVICE_ACCOUNT_KEY_FILE=service-account.json"
            echo "BUFFER_API=${{ secrets.BUFFER_API }}"
            echo "APP_PASSWORD=${{ secrets.APP_PASSWORD }}"
          } > .env.local

      - name: Build Next.js app
        run: npm run build

      - name: Start server
        run: |
          npm run start &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            echo "Waiting for server... ($i)"
            sleep 2
          done

      - name: Step 1 — Fetch tweets from Apify
        id: fetch
        run: |
          echo "Fetching tweets (may take 1-3 min)..."
          RESPONSE=$(curl -s --max-time 300 -X POST http://localhost:3000/api/fetch-tweets \
            -H "Content-Type: application/json" \
            -H "Cookie: auth=${{ secrets.APP_PASSWORD }}")
          echo "Response: $RESPONSE"

          if echo "$RESPONSE" | jq -e '.error' > /dev/null 2>&1; then
            echo "fetch-tweets failed: $RESPONSE"
            exit 1
          fi

          TWEET_COUNT=$(echo "$RESPONSE" | jq '.tweets | length')
          echo "Found $TWEET_COUNT new tweets"
          echo "tweet_count=$TWEET_COUNT" >> $GITHUB_OUTPUT

          echo "$RESPONSE" | jq '.tweets' > /tmp/tweets.json

      - name: No new tweets — skipping remaining steps
        if: steps.fetch.outputs.tweet_count == '0'
        run: echo "No new tweets found in the last 24 hours, or all have already been processed."

      - name: Step 2 — Generate PNG + MP4 files
        id: generate
        if: steps.fetch.outputs.tweet_count != '0'
        run: |
          RESPONSE=$(curl -s --max-time 300 -X POST http://localhost:3000/api/generate \
            -H "Content-Type: application/json" \
            -H "Cookie: auth=${{ secrets.APP_PASSWORD }}" \
            -d "{\"tweets\": $(cat /tmp/tweets.json)}")
          echo "Response: $RESPONSE"

          if echo "$RESPONSE" | jq -e '.error' > /dev/null 2>&1; then
            echo "generate failed: $RESPONSE"
            exit 1
          fi

          echo "$RESPONSE" | jq '.files' > /tmp/files.json
          echo "Generate complete — $(echo "$RESPONSE" | jq '.files | length') files"

      - name: Step 3 — Upload to Google Drive (with public video URLs)
        id: upload
        if: steps.fetch.outputs.tweet_count != '0'
        run: |
          RESPONSE=$(curl -s --max-time 120 -X POST http://localhost:3000/api/upload-drive \
            -H "Content-Type: application/json" \
            -H "Cookie: auth=${{ secrets.APP_PASSWORD }}" \
            -d "{\"files\": $(cat /tmp/files.json)}")
          echo "Response: $RESPONSE"

          if echo "$RESPONSE" | jq -e '.error' > /dev/null 2>&1; then
            echo "upload-drive failed: $RESPONSE"
            exit 1
          fi

          echo "$RESPONSE" > /tmp/drive_response.json
          echo "Upload complete."

      - name: Step 4 — Schedule to Instagram via Buffer
        if: steps.fetch.outputs.tweet_count != '0'
        run: |
          # Join tweets + files + drive URLs to build schedule-buffer input
          SCHEDULE_INPUT=$(jq -n \
            --slurpfile tweets /tmp/tweets.json \
            --slurpfile files /tmp/files.json \
            --slurpfile drive /tmp/drive_response.json \
            '
            ($drive[0].uploadedFiles | map(select(.driveUrl != null)) | map({(.fileName): .driveUrl}) | add) as $urlMap |
            ($tweets[0] | map({(.id): .text}) | add) as $textMap |
            {files: ($files[0] | map({
              videoUrl: $urlMap[.videoFileName],
              tweetText: $textMap[.id]
            }) | map(select(.videoUrl != null)))}
            ')

          echo "Scheduling $(echo "$SCHEDULE_INPUT" | jq '.files | length') videos..."

          RESPONSE=$(curl -s --max-time 60 -X POST http://localhost:3000/api/schedule-buffer \
            -H "Content-Type: application/json" \
            -H "Cookie: auth=${{ secrets.APP_PASSWORD }}" \
            -d "$SCHEDULE_INPUT")
          echo "Response: $RESPONSE"

          if echo "$RESPONSE" | jq -e '.error' > /dev/null 2>&1; then
            echo "schedule-buffer failed: $RESPONSE"
            exit 1
          fi

          echo "Scheduled $(echo "$RESPONSE" | jq '.scheduled | length') posts to Instagram via Buffer."

      - name: Persist tweet history
        if: steps.fetch.outputs.tweet_count != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tweet-history.json
          git diff --staged --quiet || git commit -m "chore: update tweet history [skip ci]"
          git push

      - name: Clean up secrets from disk
        if: always()
        run: rm -f .env.local service-account.json
